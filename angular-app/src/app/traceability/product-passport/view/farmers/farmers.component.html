<div class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-5">
  @for (f of farmers; track f.name) {
    <div class="rounded-xl overflow-hidden" style="background:#FAFAFA;border:1px solid #F0F0F0">
      <div class="bg-gray-100" style="height:80px">
        <img [src]="f.photo" [alt]="f.name" class="w-full h-full object-cover" />
      </div>
      <div class="p-2.5">
        <p class="text-xs font-semibold text-gray-900 leading-tight">{{ f.name }}</p>
        <p class="text-[10px] text-gray-500 mt-0.5">{{ f.location }}</p>
        <div class="flex gap-1 mt-1.5 flex-wrap">
          <span class="text-[9px] px-1.5 py-0.5 rounded" [ngStyle]="{ background: PRIMARY_LIGHT, color: PRIMARY, 'font-family': 'JetBrains Mono' }">{{ f.years }}yr</span>
          <span class="text-[9px] px-1.5 py-0.5 rounded" style="background:#FFF8E1;color:#E65100;font-family:'JetBrains Mono'">{{ f.size }}</span>
        </div>
      </div>
    </div>
  }
</div>
