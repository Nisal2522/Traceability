<div class="space-y-4">
  <div class="rounded-xl p-4" style="background:linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%);border:1px solid #C8E6C9">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" [style]="'background:white;color:' + PRIMARY">
        <app-fa-icon name="file-text" [size]="20"></app-fa-icon>
      </div>
      <div>
        <p class="font-semibold text-gray-900 text-sm">Digital Product Passport</p>
        <p class="text-xs text-gray-500">Batch MP240517 · TerraX DPP v2.1</p>
      </div>
    </div>
    <div class="space-y-1.5">
      @for (d of rows; track d.label) {
        <app-detail-row [label]="d.label" [value]="d.value" />
      }
    </div>
  </div>
  <div class="space-y-1">
    <p class="text-xs font-semibold text-gray-700 mb-2">Passport Timeline</p>
    @for (step of timeline; track step.event) {
      <div class="flex gap-3 items-start">
        <span class="text-[10px] text-gray-400 w-12 flex-shrink-0 pt-0.5" style="font-family:'JetBrains Mono'">{{ step.date }}</span>
        <div class="flex items-start gap-2 flex-1">
          <div class="w-1.5 h-1.5 rounded-full mt-1 flex-shrink-0" [style.background]="PRIMARY"></div>
          <span class="text-xs text-gray-600">{{ step.event }}</span>
        </div>
      </div>
    }
  </div>
  <button
    class="w-full flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold text-white transition-all hover:opacity-90 active:scale-98"
    [style.background]="PRIMARY"
  >
    <app-fa-icon name="download" [size]="16"></app-fa-icon> Download Product Passport (PDF)
  </button>
</div>
