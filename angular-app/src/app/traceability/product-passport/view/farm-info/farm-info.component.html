<div class="space-y-4">
  <div class="grid grid-cols-2 gap-3">
    @for (d of details; track d.label) {
      <div class="rounded-lg p-3" style="background:#FAFAFA;border:1px solid #F0F0F0">
        <p class="text-[10px] text-gray-400 mb-1" style="font-family:'JetBrains Mono'">{{ d.label }}</p>
        <p class="text-sm font-semibold text-gray-900">{{ d.value }}</p>
      </div>
    }
  </div>
  <div>
    <p class="text-xs font-semibold text-gray-700 mb-2">Sustainability Practices</p>
    @for (p of practices; track p) {
      <div class="flex items-start gap-2 py-1.5">
        <lucide-icon name="check" [size]="14" class="text-green-600 mt-0.5"></lucide-icon>
        <span class="text-xs text-gray-600">{{ p }}</span>
      </div>
    }
  </div>
  <div class="grid grid-cols-3 gap-2">
    @for (url of photos; track url) {
      <div class="rounded-xl overflow-hidden bg-gray-100" style="aspect-ratio:4/3">
        <img [src]="url" alt="Farm" class="w-full h-full object-cover" />
      </div>
    }
  </div>
</div>
