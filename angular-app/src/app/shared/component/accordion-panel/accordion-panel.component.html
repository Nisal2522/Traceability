<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
  @for (item of items; track item.id) {
    <button
      (click)="toggle(item.id)"
      class="tile-button rounded-2xl bg-white p-4 text-left transition-all"
      [style]="
        'box-shadow:' + SHADOW_SM + ';' +
        'border:1.5px solid ' + (openId === item.id ? PRIMARY : '#F0F0F0') + ';' +
        (openId === item.id ? 'background:' + PRIMARY_LIGHT + ';' : '')
      "
    >
      <span class="w-10 h-10 rounded-xl flex items-center justify-center mb-3" [style]="'background:' + (openId === item.id ? 'white' : PRIMARY_LIGHT)">
        <lucide-icon [name]="item.icon" [size]="20" [color]="PRIMARY"></lucide-icon>
      </span>
      <p class="text-sm font-semibold text-gray-900 mb-1">{{ item.title }}</p>
      <p class="text-xs text-gray-400">{{ item.description }}</p>
    </button>
  }
</div>

@if (activeItem(); as active) {
  <div class="modal-backdrop" (click)="close()">
    <div class="modal-panel bg-white" [style]="'box-shadow:0 24px 60px rgba(15,23,42,0.25)'" (click)="$event.stopPropagation()">
      <div class="modal-panel__grabber"></div>
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <span class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" [style]="'background:' + PRIMARY_LIGHT">
            <lucide-icon [name]="active.icon" [size]="18" [color]="PRIMARY"></lucide-icon>
          </span>
          <span class="text-sm font-semibold text-gray-900 truncate">{{ active.title }}</span>
        </div>
        <button
          (click)="close()"
          class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors flex-shrink-0"
          aria-label="Close"
        >
          <lucide-icon name="x" [size]="16"></lucide-icon>
        </button>
      </div>
      <div class="modal-panel__body">
        <ng-container *ngComponentOutlet="active.component"></ng-container>
      </div>
    </div>
  </div>
}
